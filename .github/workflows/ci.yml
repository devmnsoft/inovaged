name: ci
on:
  pull_request:
  push:
    branches: [ main, develop, "feature/**" ]
jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore
        run: dotnet restore InovaGed.sln 2>&1 | tee restore.log
      - name: Dependency tree
        run: dotnet list InovaGed.Infrastructure/InovaGed.Infrastructure.csproj package --include-transitive 2>&1 | tee dependencies-infrastructure.log
      - name: Package regression guard
        shell: bash
        run: |
          set -euo pipefail
          if grep -RIn "NU1605" restore.log dependencies-infrastructure.log --exclude-dir=bin --exclude-dir=obj; then
            echo "NU1605 detected during restore/dependency inspection." >&2
            exit 1
          fi
          if grep -RIn "Microsoft.AspNetCore.Cryptography.KeyDerivation.*8\.0\.11" . --include='*.csproj' --include='*.props' --include='*.targets' --include='packages.lock.json' --exclude-dir=bin --exclude-dir=obj; then
            echo "KeyDerivation 8.0.11 is not allowed in active package files." >&2
            exit 1
          fi
          if grep -RInE "<PackageReference Include=\"(Microsoft\.AspNet\.Identity\.Core|Microsoft\.AspNetCore(\.Authorization|\.Mvc\.Core)?|Microsoft\.AspNetCore\.Authorization)\" Version=\"2\." . --include='*.csproj' --exclude-dir=bin --exclude-dir=obj; then
            echo "Legacy ASP.NET Core/Identity 2.x package reference detected." >&2
            exit 1
          fi
      - name: Document move signature guard
        shell: bash
        run: |
          set -euo pipefail
          ! rg -n "SearchFoldersAsync\([^\n]*CurrentTenantId\(|MoveAsync\([^\n]*CurrentTenantId\(|MoveBulkAsync\([^\n]*CurrentTenantId\(|MoveAsync\([^\n]*CancellationToken\.None|MoveBulkAsync\([^\n]*CancellationToken\.None" --glob "*.cs"
          test -f WebGed.WebApi/WebGed.WebApi.csproj

      - name: Build
        run: dotnet build InovaGed.sln --no-restore --configuration Release
      - name: Test
        run: dotnet test InovaGed.sln --no-build --configuration Release --logger trx --results-directory TestResults
      - name: JSON validation
        run: find . -name '*.json' -not -path './**/bin/**' -not -path './**/obj/**' -print0 | xargs -0 -r python -m json.tool >/dev/null
      - name: Whitespace diff check
        run: git diff --check
      - name: Secret scan
        run: |
          ! git grep -n -E '(password|secret|token|apikey|api_key)\s*[:=]\s*["'"''][^"'"'']{12,}["'"'']' -- ':!**/bin/**' ':!**/obj/**'
      - name: Migration validation
        run: |
          test -f database/migrations/2026_07_document_guardian.sql
          test -f database/migrations/2026_07_guardian_consolidation_queue_events_dossiers.sql
          ! grep -RniE '\bdrop\s+(table|view|schema|column)\b' database/migrations
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: TestResults
